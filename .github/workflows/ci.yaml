name: Jerney GitHub Workflow CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository}}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository}}/jerney-frontend
  
jobs:
  lint: # first job
    name: "lint code" # name of the job 
    runs-on: ubuntu-latest # runs on the machine 
    continue-on-error: true # if there is any error also continue the pipeline
    strategy: # matrix statergy used to check parallel check the two files in repo
      matrix:
        component: [backend, frontend]
    steps:
     - name: Checkout code
       uses: actions/checkout@v4
    
     - name: setup node.js
       uses: actions/setup-node@v4
       with:
         node-version: 20
         cache: 'npm' # install the dependecy and save them in cache
         cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      
     - name: install dependencies
       working-directory: ${{matrix.component}}
       run: npm ci  # installed lint by using npm ci which is mostly production npm install command which is use exatct version of the package-lock.json and faster

     - name: run the Eslint 
       working-directory: ${{matrix.component}}
       run: npm run lint

  sca: # software composition analysis. second job
    name: Dependecy Audit
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "${{matrix.component}}/package-lock.json"
      
      - name: install the dependcies
        working-directory: ${{matrix.component}}
        run: npm ci 

      - name: npm audit
        working-directory: ${{matrix.component}}
        run: npm audit --audit-level=high || true # check for the High and crtical vurnebilities in dependecies.and report it and continue the workflow.


  docker-push: # this is third job. here we do docker build and push it on the GHCR        
    name: build
    runs-on: ubuntu-latest
    needs: sca
    continue-on-error: false
    permissions:
      contents: read 
      packages: write
    strategy:
      matrix:
        component: [frontend, backend]
    
    steps:
      - name: checkout repository 
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Extract metadata (tags, labels)
        id: meta # give the step id so other steps can use its output 
        uses: docker/metadata-action@v6 # it will be used to automatically generate the tag and labels for image
        with: # all the configuration 
          images: ghcr.io/${{ github.repository }}/jerney-${{matrix.component}}
          tags: | # tags
            type=ref,event=branch 
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image # push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }} # where to find file
          file: ./${{ matrix.component }}/Dockerfile # specifies which docker file to use
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true # record informaton such who built the image command which is used
          sbom: true
    
  image-scan: # this is fourth job. we use trivy for the docker image scan
    name: image scan using trivy
    runs-on: ubuntu-latest
    needs: docker-push
    continue-on-error: true
    strategy:
      matrix:
        component: [frontend, backend]
    
    steps:
      - name: checkout the repo
        uses: actions/checkout@v4

      - name: build the image for image scanning
        run: | 
           docker build -t jerney-${{matrix.component}}:scan-${{ github.sha }} ./${{matrix.component}}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'jerney-${{matrix.component}}:scan-${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
  
  iac-scan: # this is fifth job. we are using checkov for the infrastructure as code and to check k8s manifest issue
    name: iac security scan 
    runs-on: ubuntu-latest 
    needs: lint
    continue-on-error: true

    steps:
      - name: checkoout the code
        uses: actions/checkout@v4
      
      - name: run the checkov # we are using the checkov action for iac (terraform)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          skip_check: CKV_AWS_2 
          soft_fail: false 
          framework: terraform 
          output_format: cli
      
      - name: run the checkov of k8s # we are using the checkov action to check k8s manifest
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          soft_fail: true 
          framework: kubernetes 
          output_format: cli
  
  docker-file-lint: # this is sixth job. we are using the hadolint to check is issues in the docer created file 
    name: docker file lint hadolint
    runs-on: ubuntu-latest 
    needs: lint
    continue-on-error: true
    strategy:
      matrix:
        component: [frontend, backend]
    
    steps:
      - name: checkoout the code
        uses: actions/checkout@v4
      
      - name: hadolint for the docker file scan 
        uses: hadolint/hadolint-action@v3.1.0
        with:
           dockerfile: ${{matrix.component}}/Dockerfile
           failure-threshold: warning

  
  update-manifest: # this is seventh job. here we update the k8s manifest and push it 
    name: update the k8s manifest 
    runs-on: ubuntu-latest
    needs: image-scan
    if: github.event_name == 'push'
    permissions:
      contents: write 
      packages: write
    
    steps:
     - name: checkout the code
       uses: actions/checkout@v4
     
     - name: Get short SHA # to get short version of secure hash algoritham
       id: sha
       run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
     
     - name: Update Kubernetes Manifest
       run: |
        set -e
        image_tag="${{ steps.sha.outputs.short }}"

        echo "===== Current Manifest ====="
        cat k8s/jerney.yaml
        echo "============================"

        # Backend
        BACKEND_LINE=$(awk '
        /- name:[[:space:]]*jerney-backend/ {found=1}
        found && /^[[:space:]]*image:/ {print NR; exit}
        ' k8s/jerney.yaml)

        if [ -z "$BACKEND_LINE" ]; then
        echo "❌ Backend container not found!"
        exit 1
        fi

        echo "Backend image line: $BACKEND_LINE"

        sed -i "${BACKEND_LINE}s|.*|        image: ${BACKEND_IMAGE}:${image_tag}|" k8s/jerney.yaml

        # Frontend
        FRONTEND_LINE=$(awk '
        /- name:[[:space:]]*jerney-frontend/ {found=1}
        found && /^[[:space:]]*image:/ {print NR; exit}
        ' k8s/jerney.yaml)

        if [ -z "$FRONTEND_LINE" ]; then
        echo "❌ Frontend container not found!"
        exit 1
        fi

        echo "Frontend image line: $FRONTEND_LINE"

        sed -i "${FRONTEND_LINE}s|.*|        image: ${FRONTEND_IMAGE}:${image_tag}|" k8s/jerney.yaml

        echo "===== Updated Manifest ====="
        grep -n "image:" k8s/jerney.yaml

     - name: commit and push manifest update 
       run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push




  
  
        

     
      
   




    
  
  
  

          
      



      



       


    

